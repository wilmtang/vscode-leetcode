<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>LeetCode Auth Sync Options</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="page">
        <h1>LeetCode Auth Sync</h1>

        <form id="options-form" class="panel">
            <label class="check-row">
                <input id="enabled" type="checkbox">
                <span>
                    <strong>Enable browser auth sync</strong>
                    <small>Send your signed-in LeetCode session to the local VS Code LeetCode extension.</small>
                </span>
            </label>

            <label>
                <span>VS Code server port</span>
                <input id="port" type="number" min="1024" max="65535" inputmode="numeric">
                <small>Must match the VS Code setting leetcode.authSync.port. Default: 17899.</small>
            </label>

            <label>
                <span>Shared secret</span>
                <input id="secret" type="password" autocomplete="off">
                <small>Optional. If set, use the same value in VS Code setting leetcode.authSync.secret.</small>
            </label>

            <label>
                <span>Sync cooldown</span>
                <input id="cooldown-minutes" type="number" min="1" max="1440" inputmode="numeric">
                <small>Minimum minutes between successful automatic syncs. To sync again now, click Expire now in the popup, then open or refresh a leetcode.com page. Default: 30.</small>
            </label>

            <label class="check-row">
                <input id="show-cookie-only-button" type="checkbox">
                <span>
                    <strong>Show cookie-only sync button</strong>
                    <small>Auto-saves this preference. Adds an optional popup button that sends cookies immediately. It cannot capture Cloudflare or browser request headers; for normal sync, click Expire now, then open or refresh a leetcode.com page.</small>
                </span>
            </label>

            <label class="check-row">
                <input id="dev-mode" type="checkbox">
                <span>
                    <strong>Developer mode</strong>
                    <small>Auto-saves this preference. Captures the exact cookie/header payload sent to VS Code so you can copy it from the popup into a local integration-test fixture. <strong>The captured payload contains your LeetCode login secrets</strong> — keep it local. Turning this off wipes the captured payload.</small>
                </span>
            </label>

            <div class="actions">
                <button type="submit">Save</button>
                <button id="sync-now" type="button" class="secondary">Cookie-only sync</button>
            </div>

            <p id="status" class="status" role="status"></p>
        </form>
    </main>

    <script src="options.js"></script>
</body>
</html>
